<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂林露营地管理工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .map-area {
            flex: 1;
            position: relative;
            background: #F5F0E6;
            overflow: hidden;
            cursor: crosshair;
        }

        .map-transform {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        .map-image {
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        .camp-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 50;
        }

        .camp-marker .marker-dot {
            width: 16px;
            height: 16px;
            background: #3498DB;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .camp-marker:hover .marker-dot {
            transform: scale(1.2);
        }

        .region-marker {
            position: absolute;
            cursor: pointer;
            z-index: 60;
            transform: translate(-50%, -100%);
            white-space: nowrap;
        }

        .region-marker .marker-dot {
            width: 14px;
            height: 14px;
            background: #E74C3C;
            border: 2px solid white;
            border-radius: 50%;
            margin: 0 auto 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .region-marker .marker-label {
            font-size: 12px;
            font-weight: 600;
            color: #2C3E50;
            text-align: center;
            background: rgba(255,255,255,0.9);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .region-marker:hover .marker-dot {
            transform: scale(1.2);
        }

        .sidebar {
            width: 500px;
            background: white;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 200;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #2C3E50 0%, #34495E 100%);
            color: white;
            flex-shrink: 0;
        }

        .sidebar-header h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #3498DB;
        }

        .stat-label {
            font-size: 11px;
            color: #7F8C8D;
        }

        .section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2C3E50;
        }

        .import-area {
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .import-area:hover {
            border-color: #3498DB;
            background: #EBF5FB;
        }

        .click-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        .click-hint.show {
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .map-hint {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 300;
        }
            transition: all 0.3s;
            cursor: pointer;
        }

        .import-area:hover {
            border-color: #3498DB;
            background: #EBF5FB;
        }

        .import-area.dragover {
            border-color: #27AE60;
            background: #E8F8F5;
        }

        .import-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .import-text {
            font-size: 16px;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .import-hint {
            font-size: 12px;
            color: #adb5bd;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            margin-bottom: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: #3498DB;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498DB 0%, #2980B9 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #27AE60 0%, #229954 100%);
            color: white;
        }

        .btn-success:hover {
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #2C3E50;
            border: 2px solid #dee2e6;
        }

        .btn-secondary:hover {
            border-color: #3498DB;
            color: #3498DB;
        }

        .search-box {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .search-box:focus {
            outline: none;
            border-color: #3498DB;
        }

        .camp-table {
            width: 100%;
            border-collapse: collapse;
        }

        .camp-table th {
            background: #f8f9fa;
            padding: 12px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: #6c757d;
            border-bottom: 2px solid #e9ecef;
            position: sticky;
            top: 0;
        }

        .camp-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .camp-table tr:hover {
            background: #f8f9fa;
        }

        .camp-table .name {
            font-weight: 600;
            color: #2C3E50;
        }

        .camp-table .coords {
            font-family: 'Courier New', monospace;
            color: #7F8C8D;
            font-size: 12px;
        }

        .camp-table .actions {
            display: flex;
            gap: 5px;
        }

        .camp-table .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .camp-table .btn-edit {
            background: #3498DB;
            color: white;
        }

        .camp-table .btn-delete {
            background: #E74C3C;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 500px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #6c757d;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3498DB;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .export-section {
            background: #2C3E50;
            color: #ECF0F1;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #E74C3C;
        }

        .success {
            background: #D5F5E3;
            color: #27AE60;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            
            .camp-table {
                font-size: 12px;
            }
            
            .camp-table th,
            .camp-table td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="map-area" id="mapArea">
            <div class="map-transform" id="mapTransform">
                <img src="../assets/images/map-main.png" alt="地图" class="map-image" id="mapImage">
            </div>
            <div class="map-hint" id="mapHint">🗺️ 点击地图可设置坐标</div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🏕️ 桂林露营地管理工具</h1>
                <p>点击地图设置营地和行政区坐标</p>
            </div>

            <div class="sidebar-content">
                <div class="stats" id="statsSection">
                    <div class="stat-card">
                        <div class="stat-number" id="statTotal">-</div>
                        <div class="stat-label">营地数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statRegions">-</div>
                        <div class="stat-label">行政区</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statWithCoords">-</div>
                        <div class="stat-label">已定位</div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">📥 导入数据</div>
                    
                    <div class="import-area" id="importArea" onclick="document.getElementById('fileInput').click()">
                        <div style="font-size: 32px; margin-bottom: 8px;">📁</div>
                        <div style="font-size: 14px; color: #6c757d;">点击上传 JSON 文件</div>
                        <div style="font-size: 12px; color: #adb5bd;">或拖拽文件到此处</div>
                    </div>
                    <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="handleFileUpload(event)">

                    <textarea id="jsonInput" placeholder='粘贴 JSON 数据，例如：
[
  {"name": "营地名称", "x": 1400, "y": 2600, "folder": "桂林市/阳朔县"}
]' style="height: 80px; margin-bottom: 10px;"></textarea>

                    <button class="btn btn-primary" onclick="parseJsonInput()" style="width: 100%; margin-bottom: 10px;">
                        📋 解析并添加
                    </button>

                    <div id="importResult"></div>
                </div>

                <div class="section">
                    <div class="section-title">🗺️ 行政区管理</div>
                    
                    <div class="form-group">
                        <label>行政区名称</label>
                        <input type="text" id="regionName" placeholder="例：阳朔县">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="form-group">
                            <label>X 坐标</label>
                            <input type="number" id="regionX" placeholder="点击地图获取" readonly>
                        </div>
                        <div class="form-group">
                            <label>Y 坐标</label>
                            <input type="number" id="regionY" placeholder="点击地图获取" readonly>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>缩放级别 (scale)</label>
                        <input type="number" id="regionScale" value="4" min="1" max="20" step="0.5">
                    </div>
                    <button class="btn btn-primary" onclick="saveRegion()" style="width: 100%; margin-bottom: 10px;">
                        💾 保存行政区
                    </button>
                    
                    <div style="max-height: 150px; overflow-y: auto;" id="regionList"></div>
                    
                    <button class="btn btn-secondary" onclick="exportRegionConfig()" style="width: 100%; margin-top: 10px;">
                        📋 导出配置
                    </button>
                    
                    <div id="regionExportResult"></div>
                </div>

                <div class="section">
                    <div class="section-title">📋 营地列表</div>
                    
                    <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索..." oninput="filterCamps()">
                    
                    <div style="max-height: 200px; overflow-y: auto;">
                        <table class="camp-table" style="font-size: 11px;">
                            <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>X</th>
                                    <th>Y</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="campTableBody">
                                <tr><td colspan="4" class="loading">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="section">
                    <button class="btn btn-success" onclick="exportAllData()" style="width: 100%;">
                        📥 导出全部数据
                    </button>
                    <button class="btn btn-secondary" onclick="saveRegionData()" style="width: 100%; margin-top: 8px;">
                        💾 保存到文件
                    </button>
                    <div id="exportResult"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="click-hint" id="clickHint">
        👆 点击地图获取坐标
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>✏️ 编辑营地</h2>
            <div id="editForm"></div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="saveEdit()">💾 保存</button>
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let allCamps = [];
        let regions = {};
        let regionConfig = {};
        let filteredCamps = [];
        let editingCampId = null;
        
        let mapWidth = 0;
        let mapHeight = 0;
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let lastX, lastY;

        function initMap() {
            const mapImage = document.getElementById('mapImage');
            const mapTransform = document.getElementById('mapTransform');
            const mapArea = document.getElementById('mapArea');
            
            if (!mapImage) return;
            
            mapImage.onload = function() {
                mapWidth = mapImage.naturalWidth;
                mapHeight = mapImage.naturalHeight;
                
                const mapRect = mapArea.getBoundingClientRect();
                const baseScale = Math.min(mapRect.width / mapWidth, mapRect.height / mapHeight) * 0.8;
                
                scale = baseScale;
                panX = (mapRect.width - mapWidth * scale) / 2;
                panY = (mapRect.height - mapHeight * scale) / 2;
                
                updateTransform();
                fitToView();
                renderMarkers();
            };
            
            if (mapImage.complete) {
                mapImage.dispatchEvent(new Event('load'));
            }
            
            mapArea.addEventListener('mousedown', startDrag);
            mapArea.addEventListener('mousemove', drag);
            mapArea.addEventListener('mouseup', endDrag);
            mapArea.addEventListener('mouseleave', endDrag);
            mapArea.addEventListener('wheel', handleZoom);
            mapArea.addEventListener('click', handleMapClick);
            
            document.addEventListener('keydown', handleKeyboard);
        }

        function updateTransform() {
            const mapTransform = document.getElementById('mapTransform');
            if (mapTransform) {
                mapTransform.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            }
        }

        function fitToView() {
            const mapArea = document.getElementById('mapArea');
            const rect = mapArea.getBoundingClientRect();
            scale = Math.min(rect.width / mapWidth, rect.height / mapHeight) * 0.9;
            panX = (rect.width - mapWidth * scale) / 2;
            panY = (rect.height - mapHeight * scale) / 2;
            updateTransform();
        }

        function startDrag(e) {
            if (e.target.closest('.camp-marker') || e.target.closest('.region-marker')) return;
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            document.getElementById('mapArea').style.cursor = 'grabbing';
        }

        function drag(e) {
            if (!isDragging) return;
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            panX += dx;
            panY += dy;
            lastX = e.clientX;
            lastY = e.clientY;
            updateTransform();
        }

        function endDrag() {
            isDragging = false;
            document.getElementById('mapArea').style.cursor = 'crosshair';
        }

        function handleZoom(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.max(0.1, Math.min(10, scale * delta));
            
            const mapArea = document.getElementById('mapArea');
            const rect = mapArea.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            panX = mouseX - (mouseX - panX) * (newScale / scale);
            panY = mouseY - (mouseY - panY) * (newScale / scale);
            scale = newScale;
            
            updateTransform();
        }

        function handleMapClick(e) {
            if (isDragging) return;
            if (e.target.closest('.camp-marker') || e.target.closest('.region-marker')) return;
            
            const mapArea = document.getElementById('mapArea');
            const rect = mapArea.getBoundingClientRect();
            const x = (e.clientX - rect.left - panX) / scale;
            const y = (e.clientY - rect.top - panY) / scale;
            
            document.getElementById('regionX').value = Math.round(x);
            document.getElementById('regionY').value = Math.round(y);
            
            const clickHint = document.getElementById('clickHint');
            clickHint.textContent = `📍 坐标: X=${Math.round(x)}, Y=${Math.round(y)}`;
            clickHint.classList.add('show');
            setTimeout(() => clickHint.classList.remove('show'), 2000);
        }

        function handleKeyboard(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            const zoomSpeed = 1.2;
            if (e.key === '+' || e.key === '=') {
                scale *= zoomSpeed;
                updateTransform();
            } else if (e.key === '-') {
                scale /= zoomSpeed;
                updateTransform();
            } else if (e.key === '0') {
                fitToView();
            }
        }

        function renderMarkers() {
            renderCampMarkers();
            renderRegionMarkers();
        }

        function renderCampMarkers() {
            const mapArea = document.getElementById('mapArea');
            mapArea.querySelectorAll('.camp-marker').forEach(el => el.remove());
            
            allCamps.forEach((camp, index) => {
                if (camp.x === undefined || camp.y === undefined) return;
                
                const marker = document.createElement('div');
                marker.className = 'camp-marker';
                marker.style.left = (panX + camp.x * scale) + 'px';
                marker.style.top = (panY + camp.y * scale) + 'px';
                marker.innerHTML = `<div class="marker-dot" title="${camp.name}"></div>`;
                marker.onclick = (e) => {
                    e.stopPropagation();
                    editCamp(index);
                };
                mapArea.appendChild(marker);
            });
        }

        function renderRegionMarkers() {
            const mapArea = document.getElementById('mapArea');
            mapArea.querySelectorAll('.region-marker').forEach(el => el.remove());
            
            Object.keys(regionConfig).forEach(name => {
                const config = regionConfig[name];
                if (config.x === undefined || config.y === undefined) return;
                
                const marker = document.createElement('div');
                marker.className = 'region-marker';
                marker.style.left = (panX + config.x * scale) + 'px';
                marker.style.top = (panY + config.y * scale) + 'px';
                marker.innerHTML = `
                    <div class="marker-dot"></div>
                    <div class="marker-label">${name}</div>
                `;
                marker.onclick = (e) => {
                    e.stopPropagation();
                    loadRegionToForm(name);
                };
                mapArea.appendChild(marker);
            });
        }

        function bd09ToGcj02(bdLon, bdLat) {
            const x = bdLon - 0.0065;
            const y = bdLat - 0.006;
            const z = Math.sqrt(x * x + y * y) + 0.00002 * Math.sin(y * Math.PI * 3000 / 180);
            const theta = Math.atan2(y, x) + 0.000003 * Math.cos(x * Math.PI * 3000 / 180);
            return {
                lon: parseFloat(z * Math.cos(theta).toFixed(6)),
                lat: parseFloat(z * Math.sin(theta).toFixed(6))
            };
        }

        async function init() {
            await loadData();
            loadRegions();
            initMap();
        }

        async function loadData() {
            try {
                const response = await fetch('../data/camps.json');
                if (!response.ok) throw new Error('数据加载失败');
                
                const data = await response.json();
                allCamps = data.camps;
                filteredCamps = [...allCamps];
                
                updateStats();
                renderTable();
            } catch (error) {
                document.getElementById('campTableBody').innerHTML = `
                    <tr><td colspan="4" class="error">❌ ${error.message}</td></tr>
                `;
            }
        }

        function loadRegions() {
            fetch('../data/regions.json')
                .then(res => res.json())
                .then(data => {
                    regions = data.regions || {};
                    regionConfig = data.regions || {};
                    document.getElementById('statRegions').textContent = Object.keys(regions).length;
                    renderRegionList();
                })
                .catch(err => console.error('加载行政区配置失败:', err));
        }

        function renderRegionList() {
            const container = document.getElementById('regionList');
            const regionNames = Object.keys(regionConfig).sort();
            
            if (regionNames.length === 0) {
                container.innerHTML = '<p style="color: #6c757d; text-align: center; padding: 20px;">暂无行政区数据</p>';
                return;
            }
            
            container.innerHTML = regionNames.map(name => {
                const config = regionConfig[name];
                return `
                    <div class="camp-item" style="cursor: pointer; margin-bottom: 8px;" onclick="loadRegionToForm('${name}')">
                        <div style="flex: 1;">
                            <div style="font-weight: 600;">${name}</div>
                            <div style="font-size: 11px; color: #6c757d;">
                                X: ${Math.round(config.x)} Y: ${Math.round(config.y)} | Scale: ${config.scale}x
                            </div>
                        </div>
                        <button class="btn-small btn-delete" onclick="event.stopPropagation(); deleteRegion('${name}')">🗑️</button>
                    </div>
                `;
            }).join('');
        }

        function loadRegionToForm(name) {
            const config = regionConfig[name];
            document.getElementById('regionName').value = name;
            document.getElementById('regionX').value = Math.round(config.x);
            document.getElementById('regionY').value = Math.round(config.y);
            document.getElementById('regionScale').value = config.scale;
        }

        function saveRegion() {
            const name = document.getElementById('regionName').value.trim();
            const x = parseFloat(document.getElementById('regionX').value);
            const y = parseFloat(document.getElementById('regionY').value);
            const scale = parseFloat(document.getElementById('regionScale').value) || 3;
            
            if (!name) {
                alert('请输入行政区名称');
                return;
            }
            
            if (isNaN(x) || isNaN(y)) {
                alert('请输入有效的坐标');
                return;
            }
            
            regionConfig[name] = { x, y, scale };
            renderRegionList();
            renderRegionMarkers();
            
            document.getElementById('regionName').value = '';
            document.getElementById('regionX').value = '';
            document.getElementById('regionY').value = '';
            document.getElementById('regionScale').value = '3';
            
            alert('✅ 行政区已保存！');
        }

        function deleteRegion(name) {
            if (!confirm(`确定要删除行政区"${name}"吗？`)) return;
            
            delete regionConfig[name];
            renderRegionList();
            renderRegionMarkers();
            
            alert('✅ 行政区已删除！');
        }

        function exportRegionConfig() {
            const configStr = JSON.stringify(regionConfig, null, 4);
            
            document.getElementById('regionExportResult').innerHTML = `
                <div class="export-section">${configStr}</div>
                <button class="btn btn-success" style="margin-top: 15px;" onclick="copyRegionConfig()">
                    📋 复制到剪贴板
                </button>
            `;
        }

        function copyRegionConfig() {
            const configStr = JSON.stringify(regionConfig, null, 4);
            navigator.clipboard.writeText(configStr)
                .then(() => alert('✅ 已复制到剪贴板！'))
                .catch(() => alert('❌ 复制失败'));
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allCamps.length;
            
            const folders = new Set(allCamps.map(c => c.folder).filter(Boolean));
            document.getElementById('statRegions').textContent = folders.size;
            
            const withCoords = allCamps.filter(c => c.x !== undefined && c.y !== undefined).length;
            document.getElementById('statWithCoords').textContent = withCoords;
            
            document.getElementById('statLastUpdate').textContent = new Date().toLocaleDateString('zh-CN');
        }

        function renderTable() {
            const tbody = document.getElementById('campTableBody');
            
            if (filteredCamps.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #7F8C8D;">没有找到匹配的营地</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredCamps.map(camp => `
                <tr>
                    <td class="name">${camp.name}</td>
                    <td>${camp.folder ? camp.folder.replace('桂林市/', '') : '-'}</td>
                    <td class="coords">${camp.x ? Math.round(camp.x) : '-'}, ${camp.y ? Math.round(camp.y) : '-'}</td>
                    <td class="coords">${camp.lon ? camp.lon.toFixed(6) : '-'}, ${camp.lat ? camp.lat.toFixed(6) : '-'}</td>
                    <td class="coords">${camp.gcj02_lon ? camp.gcj02_lon.toFixed(6) : '-'}, ${camp.gcj02_lat ? camp.gcj02_lat.toFixed(6) : '-'}</td>
                    <td class="uid">${camp.baidu_uid || '<span style="color: #E74C3C;">缺失</span>'}</td>
                    <td class="actions">
                        <button class="btn-small btn-edit" onclick="openEditModal(${camp.id})">✏️</button>
                        <button class="btn-small btn-delete" onclick="deleteCamp(${camp.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterCamps() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                filteredCamps = [...allCamps];
            } else {
                filteredCamps = allCamps.filter(camp => 
                    camp.name.toLowerCase().includes(searchTerm) ||
                    (camp.folder && camp.folder.toLowerCase().includes(searchTerm))
                );
            }
            
            renderTable();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.name.endsWith('.json')) {
                alert('请上传 JSON 文件！');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    processImport(data);
                } catch (err) {
                    alert('JSON 解析失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function parseJsonInput() {
            const jsonText = document.getElementById('jsonInput').value.trim();
            if (!jsonText) {
                alert('请输入 JSON 数据');
                return;
            }

            try {
                const data = JSON.parse(jsonText);
                processImport(data);
            } catch (err) {
                alert('JSON 解析失败：' + err.message);
            }
        }

        function processImport(data) {
            if (!Array.isArray(data)) {
                data = [data];
            }

            const validData = data.filter(item => 
                item.name && (item.lon || item.x)
            );

            if (validData.length === 0) {
                document.getElementById('importResult').innerHTML = `
                    <div class="error" style="margin-top: 15px;">❌ 没有找到有效数据</div>
                `;
                return;
            }

            let added = 0;
            let missingUidCount = 0;

            validData.forEach(item => {
                const exists = allCamps.some(c => 
                    c.name === item.name || 
                    (item.lon && Math.abs(c.lon - item.lon) < 0.0001)
                );
                
                if (!exists) {
                    const maxId = Math.max(0, ...allCamps.map(c => c.id));
                    let gcj02_lon = item.gcj02_lon || null;
                    let gcj02_lat = item.gcj02_lat || null;
                    
                    if (item.lon && item.lat && !gcj02_lon) {
                        const gcj02 = bd09ToGcj02(item.lon, item.lat);
                        gcj02_lon = gcj02.lon;
                        gcj02_lat = gcj02.lat;
                    }

                    let baidu_uid = item.baidu_uid || null;
                    if (!baidu_uid && item.metadata && item.metadata.uid) {
                        baidu_uid = item.metadata.uid;
                    }

                    if (!baidu_uid) {
                        missingUidCount++;
                    }
                    
                    allCamps.push({
                        id: maxId + 1,
                        name: item.name,
                        lon: item.lon || null,
                        lat: item.lat || null,
                        gcj02_lon: gcj02_lon,
                        gcj02_lat: gcj02_lat,
                        baidu_uid: baidu_uid,
                        x: item.x || null,
                        y: item.y || null,
                        address: item.address || '',
                        type: item.type || '',
                        price: item.price || '',
                        folder: item.folder || '',
                        description: item.description || ''
                    });
                    added++;
                }
            });

            filteredCamps = [...allCamps];
            updateStats();
            renderTable();
            saveToFile();

            let resultMessage = `<div class="success">✅ 成功添加 ${added} 个新营地！</div>`;
            if (missingUidCount > 0) {
                resultMessage += `<div class="warning" style="margin-top: 10px;">⚠️ 警告：${missingUidCount} 个营地缺少百度地图 UID，导航功能可能不完整。</div>`;
            }

            document.getElementById('importResult').innerHTML = resultMessage;
            document.getElementById('jsonInput').value = '';
        }

        function openEditModal(id) {
            editingCampId = id;
            const camp = allCamps.find(c => c.id === id);
            if (!camp) return;

            document.getElementById('editForm').innerHTML = `
                <div class="form-group">
                    <label>营地名称</label>
                    <input type="text" id="editName" value="${camp.name}">
                </div>
                <div class="form-group">
                    <label>所属行政区</label>
                    <input type="text" id="editFolder" value="${camp.folder || ''}" placeholder="桂林市/阳朔县">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>X 坐标</label>
                        <input type="number" id="editX" value="${camp.x || ''}">
                    </div>
                    <div class="form-group">
                        <label>Y 坐标</label>
                        <input type="number" id="editY" value="${camp.y || ''}">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>BD-09 经度</label>
                        <input type="number" step="0.000001" id="editLon" value="${camp.lon || ''}">
                    </div>
                    <div class="form-group">
                        <label>BD-09 纬度</label>
                        <input type="number" step="0.000001" id="editLat" value="${camp.lat || ''}">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>GCJ-02 经度</label>
                        <input type="number" step="0.000001" id="editGcj02Lon" value="${camp.gcj02_lon || ''}" readonly>
                    </div>
                    <div class="form-group">
                        <label>GCJ-02 纬度</label>
                        <input type="number" step="0.000001" id="editGcj02Lat" value="${camp.gcj02_lat || ''}" readonly>
                    </div>
                </div>
                <div class="form-group">
                    <label>百度地图 UID</label>
                    <input type="text" id="editBaiduUid" value="${camp.baidu_uid || ''}" placeholder="用于导航功能">
                </div>
                <div class="form-group">
                    <label>地址</label>
                    <input type="text" id="editAddress" value="${camp.address || ''}">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <input type="text" id="editType" value="${camp.type || ''}">
                </div>
                <div class="form-group">
                    <label>价格</label>
                    <input type="text" id="editPrice" value="${camp.price || ''}">
                </div>
            `;

            document.getElementById('editModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
            editingCampId = null;
        }

        function saveEdit() {
            if (editingCampId === null) return;
            
            const camp = allCamps.find(c => c.id === editingCampId);
            if (!camp) return;

            camp.name = document.getElementById('editName').value;
            camp.folder = document.getElementById('editFolder').value;
            camp.x = parseFloat(document.getElementById('editX').value) || null;
            camp.y = parseFloat(document.getElementById('editY').value) || null;
            
            const newLon = parseFloat(document.getElementById('editLon').value) || null;
            const newLat = parseFloat(document.getElementById('editLat').value) || null;
            
            if (newLon && newLat) {
                camp.lon = newLon;
                camp.lat = newLat;
                const gcj02 = bd09ToGcj02(newLon, newLat);
                camp.gcj02_lon = gcj02.lon;
                camp.gcj02_lat = gcj02.lat;
            } else {
                camp.lon = newLon;
                camp.lat = newLat;
                camp.gcj02_lon = null;
                camp.gcj02_lat = null;
            }
            
            camp.baidu_uid = document.getElementById('editBaiduUid').value || null;
            camp.address = document.getElementById('editAddress').value;
            camp.type = document.getElementById('editType').value;
            camp.price = document.getElementById('editPrice').value;

            filteredCamps = [...allCamps];
            updateStats();
            renderTable();
            saveToFile();
            closeModal();
            
            alert('✅ 营地信息已保存！');
        }

        function deleteCamp(id) {
            if (!confirm('确定要删除这个营地吗？')) return;
            
            allCamps = allCamps.filter(c => c.id !== id);
            filteredCamps = filteredCamps.filter(c => c.id !== id);
            
            updateStats();
            renderTable();
            saveToFile();
        }

        async function saveToFile() {
            const data = {
                version: "1.0",
                lastUpdated: new Date().toISOString().split('T')[0],
                camps: allCamps
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'camps.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportAllData() {
            const data = {
                version: "1.0",
                lastUpdated: new Date().toISOString().split('T')[0],
                camps: allCamps
            };

            document.getElementById('exportResult').innerHTML = `
                <div class="export-section">${JSON.stringify(data, null, 2)}</div>
                <button class="btn btn-success" style="margin-top: 15px;" onclick="copyExportData()">
                    📋 复制到剪贴板
                </button>
            `;
        }

        function copyExportData() {
            const data = {
                version: "1.0",
                lastUpdated: new Date().toISOString().split('T')[0],
                camps: allCamps
            };
            
            navigator.clipboard.writeText(JSON.stringify(data, null, 2))
                .then(() => alert('✅ 已复制到剪贴板！'))
                .catch(() => alert('❌ 复制失败，请手动复制'));
        }

        function saveRegionData() {
            const data = {
                version: "1.0",
                lastUpdated: new Date().toISOString().split('T')[0],
                camps: allCamps
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `camps_export_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            document.getElementById('exportResult').innerHTML = '<p style="color: #27AE60; margin-top: 10px;">✅ 数据已导出！请手动保存到 data/camps.json</p>';
        }

        function downloadTemplate() {
            const template = [
                {
                    name: "示例营地",
                    lon: 110.5231,
                    lat: 24.7832,
                    folder: "桂林市/阳朔县",
                    address: "示例地址",
                    type: "帐篷营地",
                    price: "价格面议"
                }
            ];

            const blob = new Blob([JSON.stringify(template, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '营地导入模板.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function validateData() {
            let issues = [];
            
            allCamps.forEach(camp => {
                if (!camp.name) issues.push(`ID ${camp.id}: 缺少名称`);
                if (!camp.x || !camp.y) issues.push(`${camp.name}: 缺少坐标`);
                if (camp.lon && camp.lat && !camp.gcj02_lon) {
                    issues.push(`${camp.name}: 缺少 GCJ-02 坐标`);
                }
                if (!camp.baidu_uid) {
                    issues.push(`${camp.name}: 缺少百度地图 UID`);
                }
            });

            if (issues.length === 0) {
                document.getElementById('validationResult').innerHTML = `
                    <div class="success">✅ 数据校验通过！所有 ${allCamps.length} 个营地数据完整</div>
                `;
            } else {
                document.getElementById('validationResult').innerHTML = `
                    <div style="background: #FDF2E9; padding: 15px; border-radius: 8px; margin-top: 15px;">
                        <div style="color: #E67E22; font-weight: 600; margin-bottom: 10px;">⚠️ 发现 ${issues.length} 个问题：</div>
                        <ul style="color: #6c757d; font-size: 13px;">
                            ${issues.map(issue => `<li>${issue}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
        }

        // 拖拽上传
        const importArea = document.getElementById('importArea');
        importArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            importArea.classList.add('dragover');
        });
        importArea.addEventListener('dragleave', () => {
            importArea.classList.remove('dragover');
        });
        importArea.addEventListener('drop', (e) => {
            e.preventDefault();
            importArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if (file.name.endsWith('.json')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            processImport(data);
                        } catch (err) {
                            alert('JSON 解析失败：' + err.message);
                        }
                    };
                    reader.readAsText(file);
                } else {
                    alert('请上传 JSON 文件！');
                }
            }
        });

        init();
    </script>
</body>
</html>
