<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>桂林市露营地导览地图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2C3E50;
            --accent: #E67E22;
            --accent-light: #F39C12;
            --bg-light: #ECF0F1;
            --bg-white: #FFFFFF;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --border: #BDC3C7;
            --shadow: rgba(44, 62, 80, 0.15);
            --pin-shadow: rgba(230, 126, 34, 0.4);
            --sidebar-width: 380px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            background: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .map-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #F5F0E6;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .map-viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            position: relative;
            cursor: grab;
        }

        .map-viewport:active {
            cursor: grabbing;
        }

        .map-transform {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            transition: transform 0.05s linear;
        }

        .map-transform.animating {
            transition: none;
        }

        #markersLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #markersLayer .pin-marker {
            position: absolute;
            transform: translate(-50%, -100%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 100;
            transition: z-index 0s;
        }

        #markersLayer .pin-marker:hover {
            z-index: 200;
        }

        #markersLayer .pin-marker.active {
            z-index: 300;
        }

        .map-image {
            display: block;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        .pin-number {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--pin-shadow);
            border: 3px solid var(--bg-white);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .pin-marker:hover .pin-number {
            transform: rotate(-45deg) scale(1.15);
        }

        .pin-marker.active .pin-number {
            transform: rotate(-45deg) scale(1.25);
            box-shadow: 0 6px 20px var(--pin-shadow);
        }

        .pin-number span {
            transform: rotate(45deg);
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .region-marker {
            position: absolute;
            cursor: pointer;
            pointer-events: auto;
            z-index: 90;
            transition: all 0.3s ease;
            transform: translate(-50%, -100%);
            white-space: nowrap;
        }

        .region-marker .marker-dot {
            width: 12px;
            height: 12px;
            background: #E74C3C;
            border: 2px solid white;
            border-radius: 50%;
            margin: 0 auto 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .region-marker .marker-label {
            font-size: 12px;
            font-weight: 600;
            color: #2C3E50;
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
            text-align: center;
        }

        .region-marker:hover .marker-dot {
            transform: scale(1.2);
        }

        .cluster-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 150;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .cluster-marker:hover {
            transform: translate(-50%, -50%) scale(1.1);
            z-index: 250;
        }

        .cluster-circle {
            background: linear-gradient(135deg, #3498DB 0%, #2980B9 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(52, 152, 219, 0.4);
            border: 3px solid white;
        }

        .cluster-circle span {
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .sidebar-wrapper {
            position: relative;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: var(--sidebar-width);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-wrapper.collapsed {
            width: 0;
            overflow: visible;
        }

        .sidebar-wrapper.collapsed .sidebar-toggle-left {
            position: fixed;
            left: auto;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(230, 126, 34, 0.5);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .sidebar-wrapper.collapsed .sidebar-toggle-left:hover {
            right: 20px;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-white);
            box-shadow: -4px 0 20px var(--shadow);
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .sidebar.collapsed {
            width: 0;
        }

        .sidebar.collapsed .sidebar-header,
        .sidebar.collapsed .search-container,
        .sidebar.collapsed .stats-bar,
        .sidebar.collapsed .list-container {
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-toggle-left {
            position: absolute;
            left: -24px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: -3px 0 16px rgba(230, 126, 34, 0.4);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 700;
            overflow: hidden;
        }

        .sidebar-toggle-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .sidebar-toggle-left:hover {
            left: -20px;
            box-shadow: -5px 0 24px rgba(230, 126, 34, 0.6);
            transform: translateY(-50%) scale(1.05);
        }

        .sidebar-toggle-left:active {
            transform: translateY(-50%) scale(0.95);
        }

        .sidebar-toggle-left .toggle-icon {
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .sidebar-toggle-left:hover .toggle-icon {
            transform: scale(1.2);
        }

        .sidebar-toggle-left .toggle-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 4px 20px rgba(230, 126, 34, 0.4),
                            0 0 30px rgba(230, 126, 34, 0.2);
            }
            50% {
                box-shadow: 0 6px 30px rgba(230, 126, 34, 0.6),
                            0 0 50px rgba(230, 126, 34, 0.4);
            }
        }

        .sidebar-header {
            padding: 20px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #34495E 100%);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .search-container {
            padding: 12px 16px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-light);
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-white);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.6;
        }

        .stats-bar {
            padding: 10px 16px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .stats-bar .count {
            font-weight: 700;
            font-size: 14px;
        }

        .region-filters {
            display: flex;
            gap: 6px;
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 4px 0;
            min-width: 0;
        }

        .region-filters::-webkit-scrollbar {
            height: 3px;
        }

        .region-filters::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.5);
            border-radius: 2px;
        }

        .region-btn {
            padding: 6px 12px;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .region-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .region-btn.active {
            background: white;
            color: var(--accent);
            border-color: white;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: var(--bg-light);
        }

        .list-container::-webkit-scrollbar {
            width: 4px;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .list-item {
            background: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .list-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .list-item.active {
            border-left: 4px solid var(--accent);
        }

        .list-item-header {
            display: flex;
            gap: 10px;
            margin-bottom: 6px;
        }

        .list-item-number {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .list-item-info {
            flex: 1;
            min-width: 0;
        }

        .list-item-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item-type {
            font-size: 11px;
            color: var(--text-light);
        }

        .list-item-address {
            font-size: 11px;
            color: var(--text-light);
            padding-left: 38px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-toggle {
            position: absolute;
            left: -18px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border: none;
            border-radius: 8px 0 0 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -3px 0 10px var(--pin-shadow);
            transition: all 0.3s;
            z-index: 700;
        }

        .sidebar-toggle:hover {
            width: 42px;
        }

        .sidebar-toggle .toggle-icon {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .zoom-controls {
            position: absolute;
            right: 16px;
            bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 300;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 2px 12px var(--shadow);
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: var(--primary);
            color: white;
        }

        .zoom-level {
            position: absolute;
            left: 16px;
            bottom: 16px;
            background: rgba(44, 62, 80, 0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            z-index: 300;
        }

        .detail-panel {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 700;
            display: none;
            pointer-events: none;
        }

        .detail-panel.active {
            display: block;
            pointer-events: auto;
        }

        .detail-card {
            position: absolute;
            width: 340px;
            max-height: none;
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.25);
            overflow: hidden;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: auto;
        }

        .detail-panel.active .detail-card {
            opacity: 1;
        }

        .detail-card.position-left {
            transform: translateX(-20px);
        }

        .detail-card.position-left::before {
            content: '';
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 10px solid var(--bg-white);
        }

        .detail-card.position-right::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 10px solid var(--bg-white);
        }

        .detail-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #34495E 100%);
            color: white;
            position: relative;
        }

        .detail-header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .detail-close {
            position: absolute;
            right: 12px;
            top: 12px;
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .detail-close:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .detail-id {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .detail-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
            flex: 1;
        }

        .detail-type {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .detail-body {
            padding: 16px;
        }

        .detail-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }

        .detail-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .detail-info {
            flex: 1;
        }

        .detail-label {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 13px;
            color: var(--text-dark);
            font-weight: 500;
        }

        .detail-tags-section {
            margin-top: 12px;
        }

        .detail-tags-section-title {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .detail-tag {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .detail-desc-section {
            margin-top: 12px;
            padding: 12px;
            background: var(--bg-light);
            border-radius: 8px;
        }

        .detail-desc-title {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .detail-desc-text {
            font-size: 12px;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .detail-actions {
            padding: 12px 16px;
            background: var(--bg-light);
            display: flex;
            gap: 8px;
        }

        .detail-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .detail-btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
        }

        .detail-btn-primary:hover {
            box-shadow: 0 4px 12px var(--pin-shadow);
            transform: translateY(-1px);
        }

        .detail-btn-secondary {
            background: var(--bg-white);
            color: var(--text-dark);
            border: 2px solid var(--border);
        }

        .detail-btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 16px;
            color: var(--text-light);
        }

        .error {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 14px;
            color: #E74C3C;
            padding: 20px;
            text-align: center;
        }

        .map-selector-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .map-selector-overlay.active {
            display: block;
            opacity: 1;
        }

        .map-selector {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-white);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2001;
            max-height: 70vh;
            overflow-y: auto;
        }

        .map-selector-overlay.active .map-selector {
            transform: translateY(0);
        }

        .map-selector-header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .map-selector-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .map-selector-close {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-light);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            transition: all 0.3s;
        }

        .map-selector-close:hover {
            background: var(--border);
            color: var(--text-dark);
        }

        .map-selector-title {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 6px;
        }

        .map-list {
            display: grid;
            gap: 12px;
        }

        .map-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-light);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .map-item:hover {
            background: var(--bg-white);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .map-item.recommended {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(230, 126, 34, 0.05) 0%, rgba(243, 156, 18, 0.05) 100%);
        }

        .map-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-white);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 2px 8px var(--shadow);
            flex-shrink: 0;
        }

        .map-info {
            flex: 1;
        }

        .map-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .map-desc {
            font-size: 12px;
            color: var(--text-light);
        }

        .map-badge {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .map-arrow {
            font-size: 18px;
            color: var(--border);
            transition: all 0.3s;
        }

        .map-item:hover .map-arrow {
            color: var(--accent);
            transform: translateX(4px);
        }

        @media (max-width: 480px) {
            .map-selector {
                padding: 16px;
            }

            .map-item {
                padding: 12px;
            }

            .map-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .map-name {
                font-size: 13px;
            }

            .map-desc {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">正在加载地图数据...</div>
    </div>

    <script>
        let CAMPING_DATA = [];
        let REGION_CONFIG = {};
        let currentSite = null;
        let filteredData = [];
        let selectedRegion = null;
        let searchTerm = '';

        let scale = 1;
        let minScale = 0.1;
        let maxScale = 4;
        let panX = 0;
        let panY = 0;

        let isDragging = false;
        let startX, startY;
        let lastX, lastY;
        let lastTime;
        let velocityX = 0;
        let velocityY = 0;

        let isAnimating = false;
        let rafId = null;
        let mapWidth = 1696;
        let mapHeight = 2528;

        async function loadData() {
            try {
                const [campsRes, regionsRes] = await Promise.all([
                    fetch('data/camps.json'),
                    fetch('data/regions.json')
                ]);

                if (!campsRes.ok || !regionsRes.ok) {
                    throw new Error('数据加载失败');
                }

                const campsData = await campsRes.json();
                const regionsData = await regionsRes.json();

                CAMPING_DATA = campsData.camps;
                REGION_CONFIG = regionsData.regions;
                filteredData = [...CAMPING_DATA];

                renderApp();
            } catch (error) {
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        <div>
                            <p>❌ 数据加载失败</p>
                            <p style="margin-top: 8px; font-size: 12px;">${error.message}</p>
                        </div>
                    </div>
                `;
            }
        }

        function renderApp() {
            const regions = extractRegions();
            const regionNames = ['全部', ...Array.from(regions.keys()).sort()];

            document.getElementById('app').innerHTML = `
                <div class="app-container">
                    <div class="map-section">
                        <div class="map-viewport" id="mapViewport">
                            <div class="map-transform" id="mapTransform">
                                <img src="assets/images/map-main.png" alt="地图" class="map-image" id="mapImage">
                            </div>
                            <div id="markersLayer"></div>
                        </div>
                        <div class="zoom-controls">
                            <button class="zoom-btn" onclick="handleZoomIn()">+</button>
                            <button class="zoom-btn" onclick="handleZoomOut()">−</button>
                            <button class="zoom-btn" onclick="handleResetView()" style="font-size: 11px;">重置</button>
                        </div>
                        <div class="zoom-level" id="zoomLevel">缩放: 100%</div>
                        <div class="detail-panel" id="detailPanel">
                            <div class="detail-card">
                                <div class="detail-header">
                                    <button class="detail-close" onclick="closeDetail()">×</button>
                                    <div class="detail-header-top">
                                        <span class="detail-id" id="detailId"></span>
                                        <span class="detail-title" id="detailTitle"></span>
                                    </div>
                                    <div class="detail-type" id="detailType"></div>
                                </div>
                                <div class="detail-body">
                                    <div class="detail-row" id="detailAddressRow">
                                        <div class="detail-icon">📍</div>
                                        <div class="detail-info">
                                            <div class="detail-label">地址</div>
                                            <div class="detail-value" id="detailAddress"></div>
                                        </div>
                                    </div>
                                    <div class="detail-row" id="detailPriceRow">
                                        <div class="detail-icon">💰</div>
                                        <div class="detail-info">
                                            <div class="detail-label">价格</div>
                                            <div class="detail-value" id="detailPrice"></div>
                                        </div>
                                    </div>
                                    <div class="detail-tags-section" id="detailTagsSection">
                                        <div class="detail-tags-section-title">活动</div>
                                        <div class="detail-tags" id="detailTags"></div>
                                    </div>
                                    <div class="detail-desc-section" id="detailDescSection">
                                        <div class="detail-desc-title">提示</div>
                                        <div class="detail-desc-text" id="detailDesc"></div>
                                    </div>
                                    <div class="detail-actions">
                                        <button class="detail-btn detail-btn-primary" onclick="openMapSelector()">
                                            🗺️ 导航到这里
                                        </button>
                                        <button class="detail-btn detail-btn-secondary" onclick="searchXiaohongshu()">
                                            📕 小红书
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="map-selector-overlay" id="mapSelectorOverlay" onclick="closeMapSelector(event)">
                            <div class="map-selector" onclick="event.stopPropagation()">
                                <div class="map-selector-header">
                                    <h3>选择导航地图</h3>
                                    <button class="map-selector-close" onclick="closeMapSelector()">×</button>
                                    <div class="map-selector-title" id="mapSelectorTitle">选择要使用的导航应用</div>
                                </div>
                                <div class="map-list" id="mapList"></div>
                            </div>
                        </div>
                    </div>
                    <div class="sidebar-wrapper">
                        <div class="sidebar" id="sidebar">
                            <div class="sidebar-header">
                                <h1>🏕️ 桂林露营地导览</h1>
                                <p>共 ${CAMPING_DATA.length} 个营地</p>
                            </div>
                            <div class="search-container">
                                <div class="search-box">
                                    <input type="text" id="searchInput" placeholder="搜索营地名称..." value="${searchTerm}" oninput="handleSearch(this.value)">
                                </div>
                            </div>
                            <div class="stats-bar">
                                <span>共 <span class="count" id="totalCount">${filteredData.length}</span> 个营地</span>
                                <div class="region-filters" id="regionFilters">
                                    ${regionNames.map(name => `
                                        <button class="region-btn ${name === '全部' && !selectedRegion || name === selectedRegion ? 'active' : ''}" 
                                                onclick="filterByRegion('${name}')">
                                            ${name}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="list-container" id="listContainer"></div>
                        </div>
                        <button class="sidebar-toggle-left" onclick="toggleSidebar()">
                            <span class="toggle-icon">›</span>
                            <span class="toggle-text">收缩</span>
                        </button>
                    </div>
                </div>
            `;

            initMap();
            setupEventListeners();
            renderList(filteredData);
        }

        function initMap() {
            const mapImage = document.getElementById('mapImage');
            const viewport = document.getElementById('mapViewport');

            mapImage.onload = () => {
                mapWidth = mapImage.naturalWidth;
                mapHeight = mapImage.naturalHeight;
                fitToView();
                renderMarkers(filteredData);
                renderRegionMarkers();
            };

            if (mapImage.complete) {
                mapWidth = mapImage.naturalWidth;
                mapHeight = mapImage.naturalHeight;
                fitToView();
                renderMarkers(filteredData);
                renderRegionMarkers();
            }

            viewport.addEventListener('wheel', handleWheel, { passive: false });
            viewport.addEventListener('mousedown', handleMouseDown);
            viewport.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
            document.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.addEventListener('touchend', handleTouchEnd);
        }

        function fitToView() {
            const viewport = document.getElementById('mapViewport');
            const rect = viewport.getBoundingClientRect();
            scale = Math.min(rect.width / mapWidth, rect.height / mapHeight) * 0.95;
            panX = (rect.width - mapWidth * scale) / 2;
            panY = (rect.height - mapHeight * scale) / 2;
            updateTransform();
        }

        function handleWheel(e) {
            e.preventDefault();
            const viewport = document.getElementById('mapViewport');
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const zoomFactor = e.deltaY > 0 ? 0.85 : 1.15;
            const newScale = Math.min(maxScale, Math.max(minScale, scale * zoomFactor));

            if (newScale !== scale) {
                const oldScale = scale;
                scale = newScale;
                panX = mouseX - (mouseX - panX) * (scale / oldScale);
                panY = mouseY - (mouseY - panY) * (scale / oldScale);
                updateTransform();
                updateZoomLevel();
            }
        }

        function handleMouseDown(e) {
            if (e.target.closest('.pin-marker') || e.target.closest('.cluster-marker') || e.target.closest('.detail-card')) return;
            
            if (currentSite) {
                closeDetail();
            }
            
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            lastX = e.clientX;
            lastY = e.clientY;
            lastTime = Date.now();
            velocityX = 0;
            velocityY = 0;
            document.getElementById('mapViewport').style.cursor = 'grabbing';
            cancelAnimation();
        }

        function handleMouseMove(e) {
            if (!isDragging) return;
            const currentTime = Date.now();
            const dt = currentTime - lastTime;
            if (dt > 0) {
                velocityX = (e.clientX - lastX) / dt * 16;
                velocityY = (e.clientY - lastY) / dt * 16;
            }
            lastX = e.clientX;
            lastY = e.clientY;
            lastTime = currentTime;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        }

        function handleMouseUp() {
            if (!isDragging) return;
            isDragging = false;
            document.getElementById('mapViewport').style.cursor = 'grab';
            if (Math.abs(velocityX) > 5 || Math.abs(velocityY) > 5) {
                startInertia();
            }
        }

        function handleTouchStart(e) {
            if (e.target.closest('.pin-marker') || e.target.closest('.cluster-marker')) return;
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                isDragging = true;
                startX = touch.clientX - panX;
                startY = touch.clientY - panY;
                lastX = touch.clientX;
                lastY = touch.clientY;
                lastTime = Date.now();
                velocityX = 0;
                velocityY = 0;
                cancelAnimation();
            }
        }

        function handleTouchMove(e) {
            if (!isDragging || e.touches.length !== 1) return;
            e.preventDefault();
            const touch = e.touches[0];
            const currentTime = Date.now();
            const dt = currentTime - lastTime;
            if (dt > 0) {
                velocityX = (touch.clientX - lastX) / dt * 16;
                velocityY = (touch.clientY - lastY) / dt * 16;
            }
            lastX = touch.clientX;
            lastY = touch.clientY;
            lastTime = currentTime;
            panX = touch.clientX - startX;
            panY = touch.clientY - startY;
            updateTransform();
        }

        function handleTouchEnd() {
            isDragging = false;
            if (Math.abs(velocityX) > 5 || Math.abs(velocityY) > 5) {
                startInertia();
            }
        }

        function cancelAnimation() {
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
            isAnimating = false;
        }

        function startInertia() {
            isAnimating = true;
            const friction = 0.95;
            const minVelocity = 0.1;

            function animate() {
                if (!isAnimating) return;

                velocityX *= friction;
                velocityY *= friction;

                if (Math.abs(velocityX) < minVelocity && Math.abs(velocityY) < minVelocity) {
                    cancelAnimation();
                    return;
                }

                panX += velocityX;
                panY += velocityY;
                updateTransform();

                rafId = requestAnimationFrame(animate);
            }

            rafId = requestAnimationFrame(animate);
        }

        function updateTransform() {
            const transform = document.getElementById('mapTransform');
            transform.classList.add('animating');
            transform.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            renderMarkers(filteredData);
            renderRegionMarkers();
        }

        function updateZoomLevel() {
            document.getElementById('zoomLevel').textContent = `缩放: ${Math.round(scale * 100)}%`;
        }

        function handleZoomIn() {
            const viewport = document.getElementById('mapViewport');
            const rect = viewport.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const oldScale = scale;
            scale = Math.min(maxScale, scale * 1.3);
            panX = centerX - (centerX - panX) * (scale / oldScale);
            panY = centerY - (centerY - panY) * (scale / oldScale);
            updateTransform();
            updateZoomLevel();
        }

        function handleZoomOut() {
            const viewport = document.getElementById('mapViewport');
            const rect = viewport.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const oldScale = scale;
            scale = Math.max(minScale, scale / 1.3);
            panX = centerX - (centerX - panX) * (scale / oldScale);
            panY = centerY - (centerY - panY) * (scale / oldScale);
            updateTransform();
            updateZoomLevel();
        }

        function handleResetView() {
            fitToView();
            updateZoomLevel();
        }

        function handleSearch(value) {
            searchTerm = value;
            applyFilters();
        }

        function extractRegions() {
            const regions = new Map();
            CAMPING_DATA.forEach(site => {
                if (site.folder) {
                    const region = site.folder.replace('桂林市/', '');
                    if (!regions.has(region)) {
                        regions.set(region, []);
                    }
                    regions.get(region).push(site);
                }
            });
            return regions;
        }

        function filterByRegion(region) {
            selectedRegion = region === '全部' ? null : region;
            
            applyFilters();
            
            if (selectedRegion) {
                const config = REGION_CONFIG[selectedRegion];
                if (config) {
                    const viewport = document.getElementById('mapViewport');
                    const rect = viewport.getBoundingClientRect();
                    const baseScale = Math.min(rect.width / mapWidth, rect.height / mapHeight);
                    const effectiveScale = config.scale * baseScale;
                    scale = effectiveScale;
                    panX = rect.width / 2 - config.x * effectiveScale;
                    panY = rect.height / 2 - config.y * effectiveScale;
                    updateTransform();
                    updateZoomLevel();
                }
            } else {
                fitToView();
            }
        }

        function applyFilters() {
            let result = [...CAMPING_DATA];
            
            if (selectedRegion) {
                result = result.filter(site => 
                    site.folder && site.folder.includes(selectedRegion)
                );
            }
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                result = result.filter(site => 
                    site.name.toLowerCase().includes(term) ||
                    (site.type && site.type.toLowerCase().includes(term)) ||
                    (site.address && site.address.toLowerCase().includes(term))
                );
            }
            
            filteredData = result;
            
            document.getElementById('totalCount').textContent = filteredData.length;
            
            document.querySelectorAll('.region-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === (selectedRegion || '全部')) {
                    btn.classList.add('active');
                }
            });
            
            renderList(filteredData);
            renderMarkers(filteredData);
        }

        function renderList(data) {
            const container = document.getElementById('listContainer');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <div class="text">未找到匹配的营地</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.map(site => `
                <div class="list-item ${currentSite && currentSite.id === site.id ? 'active' : ''}" data-id="${site.id}" onclick="showDetail(${site.id})">
                    <div class="list-item-header">
                        <div class="list-item-number">${site.id}</div>
                        <div class="list-item-info">
                            <div class="list-item-name">${site.name}</div>
                            <span class="list-item-type">${site.type || ''}</span>
                        </div>
                    </div>
                    ${site.address ? `<div class="list-item-address">📍 ${site.address}</div>` : ''}
                </div>
            `).join('');
        }

        function renderMarkers(sites) {
            const markersLayer = document.getElementById('markersLayer');
            markersLayer.querySelectorAll('.pin-marker, .cluster-marker').forEach(el => el.remove());

            const clusters = new Map();
            const clusterDistance = 40;

            sites.forEach(site => {
                if (site.x === null || site.y === null) return;
                const x = panX + site.x * scale;
                const y = panY + site.y * scale;

                let clustered = false;
                for (const [key, cluster] of clusters) {
                    const [cx, cy] = key.split(',').map(Number);
                    const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                    if (dist < clusterDistance) {
                        cluster.sites.push(site);
                        cluster.x = (cluster.x * (cluster.sites.length - 1) + x) / cluster.sites.length;
                        cluster.y = (cluster.y * (cluster.sites.length - 1) + y) / cluster.sites.length;
                        clustered = true;
                        break;
                    }
                }

                if (!clustered) {
                    clusters.set(`${x},${y}`, { sites: [site], x, y });
                }
            });

            clusters.forEach((cluster, key) => {
                if (cluster.sites.length === 1) {
                    const site = cluster.sites[0];
                    const marker = document.createElement('div');
                    marker.className = 'pin-marker' + (currentSite && currentSite.id === site.id ? ' active' : '');
                    marker.setAttribute('data-id', site.id);
                    marker.style.left = cluster.x + 'px';
                    marker.style.top = cluster.y + 'px';
                    marker.innerHTML = `
                        <div class="pin-number">
                            <span>${site.id}</span>
                        </div>
                    `;
                    marker.onclick = () => showDetail(site.id);
                    markersLayer.appendChild(marker);
                } else {
                    const size = 36 + Math.min(cluster.sites.length * 2, 16);
                    const marker = document.createElement('div');
                    marker.className = 'cluster-marker';
                    marker.style.left = cluster.x + 'px';
                    marker.style.top = cluster.y + 'px';
                    marker.innerHTML = `
                        <div class="cluster-circle" style="width: ${size}px; height: ${size}px;">
                            <span>${cluster.sites.length}</span>
                        </div>
                    `;
                    marker.onclick = () => handleClusterClick(cluster.sites.map(s => s.id).join(','));
                    markersLayer.appendChild(marker);
                }
            });
        }

        function handleClusterClick(ids) {
            const idArray = ids.split(',').map(id => parseInt(id));
            if (idArray.length === 1) {
                showDetail(idArray[0]);
                return;
            }
            const site = CAMPING_DATA.find(s => s.id === idArray[0]);
            if (!site) return;
            const factor = 2.5;
            const newScale = Math.min(maxScale, scale * factor);
            const viewport = document.getElementById('mapViewport');
            const rect = viewport.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            scale = newScale;
            panX = centerX - site.x * scale;
            panY = centerY - site.y * scale;
            updateTransform();
            updateZoomLevel();
        }

        function renderRegionMarkers() {
            const markersLayer = document.getElementById('markersLayer');
            markersLayer.querySelectorAll('.region-marker').forEach(el => el.remove());

            if (selectedRegion && REGION_CONFIG[selectedRegion]) {
                const config = REGION_CONFIG[selectedRegion];
                const markerX = panX + config.x * scale;
                const markerY = panY + config.y * scale;
                const marker = document.createElement('div');
                marker.className = 'region-marker';
                marker.style.left = markerX + 'px';
                marker.style.top = markerY + 'px';
                marker.innerHTML = `
                    <div class="marker-dot"></div>
                    <div class="marker-label">${selectedRegion}</div>
                `;
                marker.onclick = () => filterByRegion(selectedRegion);
                markersLayer.appendChild(marker);
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const wrapper = sidebar.parentElement;
            
            sidebar.classList.toggle('collapsed');
            wrapper.classList.toggle('collapsed');
            
            const toggleIcon = sidebar.parentElement.querySelector('.sidebar-toggle-left .toggle-icon');
            const toggleText = sidebar.parentElement.querySelector('.sidebar-toggle-left .toggle-text');
            
            if (sidebar.classList.contains('collapsed')) {
                toggleIcon.innerHTML = '‹';
                toggleText.textContent = '展开';
            } else {
                toggleIcon.innerHTML = '›';
                toggleText.textContent = '收缩';
            }
            
            setTimeout(() => {
                if (!sidebar.classList.contains('collapsed')) {
                    fitToView();
                }
            }, 450);
        }

        function setupEventListeners() {
            const regionFilters = document.getElementById('regionFilters');
            if (regionFilters) {
                let isScrolling = false;
                let startX = 0;
                let scrollLeft = 0;

                regionFilters.addEventListener('touchstart', (e) => {
                    isScrolling = true;
                    startX = e.touches[0].pageX - regionFilters.offsetLeft;
                    scrollLeft = regionFilters.scrollLeft;
                }, { passive: true });

                regionFilters.addEventListener('touchmove', (e) => {
                    if (!isScrolling) return;
                    e.preventDefault();
                    const x = e.touches[0].pageX - regionFilters.offsetLeft;
                    const walk = (x - startX) * 1.5;
                    regionFilters.scrollLeft = scrollLeft - walk;
                }, { passive: false });

                regionFilters.addEventListener('touchend', () => {
                    isScrolling = false;
                }, { passive: true });
            }

            const listContainer = document.getElementById('listContainer');
            if (listContainer) {
                let isScrolling = false;
                let startY = 0;
                let scrollTop = 0;

                listContainer.addEventListener('touchstart', (e) => {
                    if (e.target.closest('.search-container')) return;
                    isScrolling = true;
                    startY = e.touches[0].pageY - listContainer.offsetTop;
                    scrollTop = listContainer.scrollTop;
                }, { passive: true });

                listContainer.addEventListener('touchmove', (e) => {
                    if (!isScrolling) return;
                    e.preventDefault();
                    const y = e.touches[0].pageY - listContainer.offsetTop;
                    const walk = (y - startY) * 1.5;
                    listContainer.scrollTop = scrollTop - walk;
                }, { passive: false });

                listContainer.addEventListener('touchend', () => {
                    isScrolling = false;
                }, { passive: true });
            }
        }

        function showDetail(id) {
            const site = CAMPING_DATA.find(s => s.id === id);
            if (!site) return;
            
            currentSite = site;

            const viewport = document.getElementById('mapViewport');
            const rect = viewport.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            scale = 2;
            panX = centerX - site.x * scale;
            panY = centerY - site.y * scale;
            
            updateTransform();
            updateZoomLevel();
            
            setTimeout(() => {
                const markerX = panX + site.x * scale;
                const markerY = panY + site.y * scale;
                
                const cardWidth = 340;
                const cardHeight = 400;
                const gap = 16;
                
                let cardLeft = markerX + gap;
                let cardTop = markerY - cardHeight / 2;
                let position = 'right';
                
                if (cardLeft + cardWidth > rect.width - 16) {
                    cardLeft = markerX - cardWidth - gap;
                    position = 'left';
                }
                
                if (cardTop < 16) {
                    cardTop = 16;
                } else if (cardTop + cardHeight > rect.height - 16) {
                    cardTop = rect.height - cardHeight - 16;
                }
                
                const detailPanel = document.getElementById('detailPanel');
                const detailCard = detailPanel.querySelector('.detail-card');
                
                detailCard.style.left = cardLeft + 'px';
                detailCard.style.top = cardTop + 'px';
                detailCard.style.transform = 'translateX(0)';
                detailCard.className = 'detail-card position-' + position;
                
                document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
                document.querySelector(`.list-item[data-id="${id}"]`)?.classList.add('active');
                document.querySelectorAll('.pin-marker').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.cluster-marker').forEach(el => el.classList.remove('active'));
                document.querySelector(`.pin-marker[data-id="${id}"]`)?.classList.add('active');

                document.getElementById('detailId').textContent = site.id;
                document.getElementById('detailTitle').textContent = site.name;
                document.getElementById('detailType').textContent = site.type || '营地';

                const addressRow = document.getElementById('detailAddressRow');
                if (site.address) {
                    addressRow.style.display = 'flex';
                    document.getElementById('detailAddress').textContent = site.address;
                } else {
                    addressRow.style.display = 'none';
                }

                const priceRow = document.getElementById('detailPriceRow');
                if (site.price) {
                    priceRow.style.display = 'flex';
                    document.getElementById('detailPrice').textContent = site.price;
                } else {
                    priceRow.style.display = 'none';
                }

                const tagsSection = document.getElementById('detailTagsSection');
                const tagsContainer = document.getElementById('detailTags');
                const activities = extractActivities(site.description);
                if (activities.length > 0) {
                    tagsSection.style.display = 'block';
                    tagsContainer.innerHTML = activities.map(a => `<span class="detail-tag">${a}</span>`).join('');
                } else {
                    tagsSection.style.display = 'none';
                }

                const descSection = document.getElementById('detailDescSection');
                const descContainer = document.getElementById('detailDesc');
                const tips = extractTips(site.description);
                if (tips) {
                    descSection.style.display = 'block';
                    descContainer.textContent = tips;
                } else {
                    descSection.style.display = 'none';
                }

                detailPanel.classList.add('active');
            }, 100);
        }

        function extractActivities(desc) {
            if (!desc) return [];
            const match = desc.match(/活动：([^|]+)/);
            if (match) {
                return match[1].split(',').map(s => s.trim()).filter(s => s);
            }
            return [];
        }

        function extractTips(desc) {
            if (!desc) return '';
            const match = desc.match(/提示：([^|]+)/);
            return match ? match[1].trim() : '';
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('active');
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.pin-marker').forEach(el => el.classList.remove('active'));
            currentSite = null;
        }

        function getAvailableMaps() {
            const maps = [{
                id: 'baidu',
                name: '百度地图',
                icon: '🧭',
                desc: '查看营地详情和位置',
                coord: 'bd09',
                priority: 1
            }];

            return maps;
        }

        function openMapSelector() {
            if (!currentSite) return;

            const maps = getAvailableMaps();
            const mapList = document.getElementById('mapList');
            const mapSelectorTitle = document.getElementById('mapSelectorTitle');

            mapSelectorTitle.textContent = currentSite.name;

            mapList.innerHTML = maps.map((map, index) => `
                <div class="map-item ${index === 0 ? 'recommended' : ''}" onclick="navigateWithMap('${map.id}')">
                    <div class="map-icon">${map.icon}</div>
                    <div class="map-info">
                        <div class="map-name">${map.name}</div>
                        <div class="map-desc">${map.desc}</div>
                    </div>
                    ${index === 0 ? '<span class="map-badge">打开</span>' : ''}
                    <div class="map-arrow">›</div>
                </div>
            `).join('');

            const overlay = document.getElementById('mapSelectorOverlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMapSelector(event) {
            if (event && event.target !== event.currentTarget) return;
            const overlay = document.getElementById('mapSelectorOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function navigateWithMap(mapType) {
            if (!currentSite) return;

            closeMapSelector();

            if (mapType === 'baidu') {
                const encodedName = encodeURIComponent(currentSite.name);
                const baiduLon = currentSite.lon;
                const baiduLat = currentSite.lat;
                const baiduUid = currentSite.baidu_uid;

                let baiduUrl;

                if (baiduUid) {
                    baiduUrl = `https://ditu.baidu.com/poi/${encodedName}@${baiduLon},${baiduLat},19z?uid=${baiduUid}&ugc_type=3&ugc_ver=1&device_ratio=2&compat=1&querytype=detailConInfo&da_src=shareurl`;
                } else {
                    baiduUrl = `https://ditu.baidu.com/poi/${encodedName}@${baiduLon},${baiduLat},19z`;
                }

                window.location.href = baiduUrl;
            }
        }

        function searchXiaohongshu() {
            if (!currentSite) return;
            const url = `https://www.xiaohongshu.com/search_result?keyword=${encodeURIComponent(currentSite.name)}&source=web_explore_feed`;
            window.open(url, '_blank');
        }

        loadData();
    </script>
</body>
</html>
